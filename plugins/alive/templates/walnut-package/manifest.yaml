# .walnut Package Manifest
#
# Every .walnut archive contains this file at the root.
# All fields marked [required] must be present. Fields marked [optional]
# may be omitted. The receiver validates this manifest before
# importing any content.
#
# Format version: 1.1.0
# Inspired by BagIt RFC 8493 principles (integrity via checksums, self-describing).
#
# NOTE: String fields use {{placeholder}} syntax for substitution by
# alive:share. Non-string fields (boolean, integer) use concrete example
# values that the share skill replaces at generation time.

# ──────────────────────────────────────────────────────────────────────
# Format version (semver) [required]
#
# Major bump = breaking change to manifest schema or archive structure.
# Minor bump = backwards-compatible additions.
# Patch bump = documentation only.
#
# Receiver blocks on major version mismatch.
# ──────────────────────────────────────────────────────────────────────
format_version: "1.1.0"

# ──────────────────────────────────────────────────────────────────────
# Source provenance [required]
#
# Full transparency. The recipient sees where this came from.
# ──────────────────────────────────────────────────────────────────────
source:
  # Name of the source walnut [required, string]
  walnut: "{{walnut_name}}"

  # Session that created this package [required, string]
  session_id: "{{session_id}}"

  # AI engine that ran during packaging [required, string]
  engine: "{{engine}}"

  # ALIVE plugin version installed when package was created [required, string (semver)]
  # Receiver checks major version compatibility.
  plugin_version: "{{plugin_version}}"

# ──────────────────────────────────────────────────────────────────────
# Scope [required, enum: "full" | "capsule" | "snapshot"]
#
# full     - entire _core/ minus _squirrels/. Creates new walnut on import.
# capsule  - one or more capsules + parent key.md. Into existing walnut.
# snapshot - key.md + now.md + insights.md. Read-only status briefing.
# ──────────────────────────────────────────────────────────────────────
scope: "{{scope}}"

# ──────────────────────────────────────────────────────────────────────
# Timestamp [required, string (ISO 8601 with timezone)]
# ──────────────────────────────────────────────────────────────────────
created: "{{created_iso8601}}"

# ──────────────────────────────────────────────────────────────────────
# Encryption flag [required, boolean]
#
# true  => the archive contains payload.enc (encrypted content)
# false => content files are directly accessible in the archive
#
# When true, the archive contains payload.enc and optionally payload.key
# (RSA-wrapped AES key for relay transport). See format-spec.md Section 3.
# Replace with true when generating an encrypted package.
# ──────────────────────────────────────────────────────────────────────
encrypted: false

# ──────────────────────────────────────────────────────────────────────
# Description [required, string]
#
# One-line human-readable summary (no newlines).
# Auto-generated from key.md goal (full/snapshot) or capsule goal (capsule).
# ──────────────────────────────────────────────────────────────────────
description: "{{description}}"

# ──────────────────────────────────────────────────────────────────────
# Personal note [optional, string]
#
# Free-form message from the sender. Shown in a bordered block on import.
# ──────────────────────────────────────────────────────────────────────
# note: "Hey, check out the shielding review -- draft 02 has the updated numbers."

# ──────────────────────────────────────────────────────────────────────
# Capsule names [optional, array of strings]
#
# Only present for capsule scope. Lists the capsule directories included.
# ──────────────────────────────────────────────────────────────────────
# capsules:
#   - "shielding-review"
#   - "safety-brief"

# ──────────────────────────────────────────────────────────────────────
# Relay provenance [optional, object]
#
# Present only when the sender has a relay configured and the package
# was created via alive:share with relay push. Omitted for manual shares.
#
# Enables bootstrap: the recipient's alive:receive detects this field
# and offers to join the sender's relay, then create their own.
#
# Fields:
#   repo   - GitHub repo for the sender's relay [required, string]
#   sender - sender's GitHub username on the relay [required, string]
# ──────────────────────────────────────────────────────────────────────
# relay:
#   repo: "{{relay_repo}}"
#   sender: "{{relay_sender}}"

# ──────────────────────────────────────────────────────────────────────
# File inventory [required, array of objects]
#
# Every file in the archive except manifest.yaml itself and envelope
# files (payload.enc, payload.key). Envelope files are not content --
# they are validated structurally, not via checksum.
# The receiver validates each sha256 checksum before importing.
#
# Fields per entry:
#   path   - relative path from archive root [required, string]
#   sha256 - SHA-256 hex digest of file contents [required, string (64 chars)]
#   size   - file size in bytes [required, integer]
#
# RECOMMENDED: sort entries lexicographically by path for stable diffs.
# Replace the example entries below with actual file data at generation time.
# ──────────────────────────────────────────────────────────────────────
files:
  - path: "_core/key.md"
    sha256: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
    size: 0

  - path: "_core/now.md"
    sha256: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
    size: 0

  # ... one entry per file in the archive
